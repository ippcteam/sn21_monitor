services:
  - type: web
    name: sn21-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DASHBOARD_PASSWORD
        sync: false          # Set this manually in Render dashboard — never commit it
      - key: TAOSTATS_API_KEY
        sync: false
      - key: TAOSTATS_OWNER_ID
        sync: false
      # Use 3.11.x so bittensor/bt-decode install from wheels (3.14 triggers Rust/maturin + read-only FS)
      - key: PYTHON_VERSION
        value: "3.11.11"
      # Needed for /api/backfill & backfill_chain.py (historical blocks); finney tip uses default in collector
      - key: SUBTENSOR_ARCHIVE_NETWORK
        value: "archive"
    disk:
      name: sn21-data
      mountPath: /data
      sizeGB: 1
