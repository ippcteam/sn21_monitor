services:
  - type: web
    name: sn21-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DASHBOARD_PASSWORD
        sync: false          # Set this manually in Render dashboard — never commit it
      - key: PYTHON_VERSION
        value: "3.11.0"
    disk:
      name: sn21-data
      mountPath: /data
      sizeGB: 1
