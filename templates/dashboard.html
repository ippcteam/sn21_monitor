<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SN21 · HOPE Monitor</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #111827;
      --surface:   #151f2e;
      --surface2:  #1a2640;
      --border:    #1e2d42;
      --red:       #EF4444;
      --blue:      #2563EB;
      --blue-lt:   #3b82f6;
      --amber:     #F59E0B;
      --purple:    #8B5CF6;
      --green:     #10b981;
      --text:      #e2e8f0;
      --text-dim:  #94a3b8;
      --muted:     #475569;
      --mono:      'JetBrains Mono', monospace;
      --display:   'Rajdhani', sans-serif;
    }

    html, body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--display);
      min-height: 100vh;
    }

    body {
      background-image:
        radial-gradient(ellipse at 5% 0%, rgba(37,99,235,0.08) 0%, transparent 45%),
        radial-gradient(ellipse at 95% 100%, rgba(139,92,246,0.05) 0%, transparent 45%);
    }

    /* ── Layout ── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
      height: 56px;
      border-bottom: 1px solid var(--border);
      background: rgba(21,31,46,0.9);
      backdrop-filter: blur(8px);
      position: sticky; top: 0; z-index: 100;
    }

    .topbar-left { display: flex; align-items: center; gap: 1.2rem; }

    .status-dot {
      width: 7px; height: 7px;
      background: var(--green);
      border-radius: 50%;
      animation: breathe 3s ease-in-out infinite;
    }

    @keyframes breathe {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(16,185,129,0.4); }
      50% { opacity: 0.7; box-shadow: 0 0 0 4px rgba(16,185,129,0); }
    }

    .brand {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: var(--text);
    }

    .brand span { color: var(--red); }

    .netuid-badge {
      font-family: var(--mono);
      font-size: 0.65rem;
      padding: 0.2rem 0.5rem;
      border: 1px solid var(--border);
      border-radius: 3px;
      color: var(--muted);
      letter-spacing: 0.1em;
    }

    .topbar-right { display: flex; align-items: center; gap: 1.5rem; }

    .last-update {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      letter-spacing: 0.05em;
    }

    .btn-sm {
      font-family: var(--display);
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 0.3rem 0.75rem;
      border-radius: 3px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-dim);
      cursor: pointer;
      transition: all 0.15s;
      text-decoration: none;
      display: inline-flex; align-items: center;
    }
    .btn-sm:hover { border-color: var(--blue); color: var(--blue); }
    .btn-sm.primary { background: var(--blue); border-color: var(--blue); color: white; }
    .btn-sm.primary:hover { background: #1d4ed8; }

    .main { padding: 2rem; max-width: 1400px; margin: 0 auto; }

    /* ── Section title ── */
    .section-label {
      font-family: var(--mono);
      font-size: 0.65rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 1rem;
      display: flex; align-items: center; gap: 0.75rem;
    }
    .section-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* ── Cards ── */
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 1rem;
      margin-bottom: 2rem;
    }

    @media (max-width: 900px) { .cards-grid { grid-template-columns: repeat(2, 1fr); } }
    @media (max-width: 500px) { .cards-grid { grid-template-columns: 1fr; } }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.25rem 1.5rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .card:hover { border-color: #2a3a55; }

    .card-accent {
      position: absolute;
      top: 0; left: 0;
      width: 3px; height: 100%;
    }

    .card-label {
      font-family: var(--mono);
      font-size: 0.62rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.6rem;
    }

    .card-value {
      font-family: var(--mono);
      font-size: 1.7rem;
      font-weight: 600;
      color: var(--text);
      line-height: 1;
      margin-bottom: 0.5rem;
      letter-spacing: -0.02em;
    }

    .card-unit {
      font-size: 0.85rem;
      color: var(--muted);
      margin-left: 0.25rem;
    }

    .card-delta {
      font-family: var(--mono);
      font-size: 0.72rem;
      display: inline-flex;
      align-items: center;
      gap: 0.2rem;
    }

    .delta-up   { color: var(--green); }
    .delta-down { color: var(--red); }
    .delta-flat { color: var(--muted); }

    .card-sub {
      font-family: var(--mono);
      font-size: 0.65rem;
      color: var(--muted);
      margin-top: 0.3rem;
    }

    /* ── Charts ── */
    .charts-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      margin-bottom: 2rem;
    }

    .charts-grid .full { grid-column: 1 / -1; }

    @media (max-width: 800px) {
      .charts-grid { grid-template-columns: 1fr; }
      .charts-grid .full { grid-column: 1; }
    }

    .chart-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 1.25rem 1.5rem;
    }

    .chart-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 1.25rem;
    }

    .chart-title {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .chart-meta {
      font-family: var(--mono);
      font-size: 0.6rem;
      color: var(--muted);
    }

    .chart-canvas-wrap {
      position: relative;
      height: 200px;
    }

    /* ── UID Table ── */
    .table-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 2rem;
    }

    .table-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .table-title {
      font-size: 0.8rem;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .table-wrap { overflow-x: auto; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-family: var(--mono);
      font-size: 0.75rem;
    }

    th {
      text-align: left;
      padding: 0.6rem 1.5rem;
      font-size: 0.6rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
      font-weight: 500;
    }

    td {
      padding: 0.65rem 1.5rem;
      border-bottom: 1px solid rgba(30,45,66,0.5);
      color: var(--text-dim);
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(37,99,235,0.04); }

    td.uid  { color: var(--blue-lt); font-weight: 500; }
    td.em   { color: var(--amber); }
    td.mono { color: var(--text-dim); }

    /* ── Loading / empty ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100px;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.75rem;
      gap: 0.75rem;
    }

    .spinner {
      width: 16px; height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .no-data {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 3rem;
      gap: 0.75rem;
      color: var(--muted);
      font-family: var(--mono);
      font-size: 0.75rem;
      text-align: center;
    }

    .no-data strong { font-size: 1rem; color: var(--text-dim); }

    /* ── Alert banner ── */
    .alert-banner {
      display: none;
      padding: 0.75rem 1.5rem;
      margin-bottom: 1.5rem;
      border-radius: 4px;
      font-family: var(--mono);
      font-size: 0.75rem;
      align-items: center;
      gap: 0.75rem;
    }
    .alert-banner.show { display: flex; }
    .alert-drop  { background: rgba(239,68,68,0.08); border: 1px solid rgba(239,68,68,0.25); color: var(--red); }
    .alert-surge { background: rgba(16,185,129,0.08); border: 1px solid rgba(16,185,129,0.25); color: var(--green); }
  </style>
</head>
<body>

<!-- Top bar -->
<header class="topbar">
  <div class="topbar-left">
    <div class="status-dot" id="statusDot"></div>
    <span class="brand">SN<span>21</span></span>
    <span class="netuid-badge">NETUID · 21 · FINNEY</span>
  </div>
  <div class="topbar-right">
    <span class="last-update" id="lastUpdate">—</span>
    <button class="btn-sm primary" onclick="triggerCollect()">Collect Now</button>
    <a href="/logout" class="btn-sm">Logout</a>
  </div>
</header>

<main class="main">

  <!-- Alert banner -->
  <div class="alert-banner" id="alertBanner"></div>

  <!-- ── Metric Cards ── -->
  <div class="section-label">Live Metrics</div>
  <div class="cards-grid" id="cardsGrid">
    <div class="loading"><div class="spinner"></div> Loading…</div>
  </div>

  <!-- ── Charts ── -->
  <div class="section-label">Trend Charts</div>
  <div class="charts-grid" id="chartsGrid" style="display:none">

    <!-- Accumulation — full width -->
    <div class="chart-card full">
      <div class="chart-header">
        <span class="chart-title">Owner Alpha Accumulation</span>
        <span class="chart-meta" id="accMeta">—</span>
      </div>
      <div class="chart-canvas-wrap">
        <canvas id="chartAccumulation"></canvas>
      </div>
    </div>

    <!-- Alpha price -->
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">Alpha Price (τ)</span>
        <span class="chart-meta" id="alphaMeta">—</span>
      </div>
      <div class="chart-canvas-wrap">
        <canvas id="chartAlpha"></canvas>
      </div>
    </div>

    <!-- TAO price -->
    <div class="chart-card">
      <div class="chart-header">
        <span class="chart-title">TAO Price (USD)</span>
        <span class="chart-meta" id="taoMeta">—</span>
      </div>
      <div class="chart-canvas-wrap">
        <canvas id="chartTao"></canvas>
      </div>
    </div>

    <!-- Daily emissions -->
    <div class="chart-card full">
      <div class="chart-header">
        <span class="chart-title">Daily Alpha Emission</span>
        <span class="chart-meta">Total vs Owner Share</span>
      </div>
      <div class="chart-canvas-wrap">
        <canvas id="chartEmission"></canvas>
      </div>
    </div>

  </div>

  <!-- ── No data state ── -->
  <div id="noData" style="display:none">
    <div class="no-data">
      <strong>No data yet</strong>
      <span>Click "Collect Now" to run the first collection</span>
    </div>
  </div>

  <!-- ── UID Table ── -->
  <div class="section-label">Active UIDs · Latest Snapshot</div>
  <div class="table-card" id="uidTable">
    <div class="loading"><div class="spinner"></div> Loading…</div>
  </div>

</main>

<script>
const CHART_DEFAULTS = {
  responsive: true,
  maintainAspectRatio: false,
  animation: { duration: 600 },
  plugins: {
    legend: { display: false },
    tooltip: {
      backgroundColor: '#1a2640',
      borderColor: '#1e2d42',
      borderWidth: 1,
      titleColor: '#94a3b8',
      bodyColor: '#e2e8f0',
      titleFont: { family: "'JetBrains Mono', monospace", size: 11 },
      bodyFont: { family: "'JetBrains Mono', monospace", size: 12 },
      padding: 10,
    }
  },
  scales: {
    x: {
      grid: { color: 'rgba(30,45,66,0.8)', drawBorder: false },
      ticks: { color: '#475569', font: { family: "'JetBrains Mono', monospace", size: 10 }, maxTicksLimit: 8 }
    },
    y: {
      grid: { color: 'rgba(30,45,66,0.8)', drawBorder: false },
      ticks: { color: '#475569', font: { family: "'JetBrains Mono', monospace", size: 10 }, maxTicksLimit: 6 },
      position: 'right',
    }
  }
};

let charts = {};

function fmt(n, decimals = 4) {
  if (n === null || n === undefined) return '—';
  return parseFloat(n).toFixed(decimals);
}

function fmtDelta(pct) {
  if (pct === null || pct === undefined) return '';
  const abs = Math.abs(pct).toFixed(1);
  if (pct > 0) return `<span class="card-delta delta-up">▲ ${abs}%</span>`;
  if (pct < 0) return `<span class="card-delta delta-down">▼ ${abs}%</span>`;
  return `<span class="card-delta delta-flat">— 0%</span>`;
}

async function loadSummary() {
  const r = await fetch('/api/summary');
  const d = await r.json();

  if (d.error) {
    document.getElementById('cardsGrid').innerHTML = '';
    document.getElementById('noData').style.display = 'block';
    return null;
  }

  document.getElementById('lastUpdate').textContent = d.date + ' · block ' + d.block.toLocaleString();

  const cards = [
    {
      label: 'Owner Share Today',
      value: fmt(d.owner_share_alpha, 6),
      unit: 'ξ',
      delta: fmtDelta(d.emission_change_pct),
      sub: 'Total emitted: ' + fmt(d.total_alpha_emission, 6) + ' ξ',
      accent: '#EF4444',
    },
    {
      label: 'Running Accumulation',
      value: fmt(d.running_total_alpha, 4),
      unit: 'ξ',
      delta: '',
      sub: d.active_uids + ' active UIDs',
      accent: '#F59E0B',
    },
    {
      label: 'Alpha Price',
      value: fmt(d.alpha_price_tao, 6),
      unit: 'τ',
      delta: fmtDelta(d.alpha_price_change_pct),
      sub: d.alpha_price_usd ? '≈ $' + fmt(d.alpha_price_usd, 6) : '',
      accent: '#2563EB',
    },
    {
      label: 'TAO Price',
      value: d.tao_price_usd ? '$' + fmt(d.tao_price_usd, 2) : '—',
      unit: '',
      delta: fmtDelta(d.tao_price_change_pct),
      sub: 'via CoinGecko',
      accent: '#8B5CF6',
    },
  ];

  document.getElementById('cardsGrid').innerHTML = cards.map(c => `
    <div class="card">
      <div class="card-accent" style="background:${c.accent}"></div>
      <div class="card-label">${c.label}</div>
      <div class="card-value">${c.value}<span class="card-unit">${c.unit}</span></div>
      ${c.delta}
      <div class="card-sub">${c.sub}</div>
    </div>
  `).join('');

  return d;
}

async function loadHistory() {
  const r = await fetch('/api/history?days=30');
  const d = await r.json();
  return d;
}

async function loadUids() {
  const r = await fetch('/api/uids');
  const uids = await r.json();

  if (!uids.length) {
    document.getElementById('uidTable').innerHTML = '<div class="no-data"><span>No active UIDs</span></div>';
    return;
  }

  // Sort by emission desc
  uids.sort((a, b) => b.emission - a.emission);

  document.getElementById('uidTable').innerHTML = `
    <div class="table-header">
      <span class="table-title">Active UIDs</span>
      <span style="font-family:var(--mono);font-size:0.65rem;color:var(--muted)">${uids.length} active</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>UID</th>
            <th>Emission (ξ)</th>
            <th>Incentive</th>
            <th>Dividend</th>
            <th>Stake (ξ)</th>
            <th>Hotkey</th>
          </tr>
        </thead>
        <tbody>
          ${uids.map(u => `
            <tr>
              <td class="uid">${u.uid}</td>
              <td class="em">${u.emission.toFixed(8)}</td>
              <td class="mono">${u.incentive.toFixed(6)}</td>
              <td class="mono">${u.dividend.toFixed(6)}</td>
              <td class="mono">${u.stake.toFixed(4)}</td>
              <td class="mono" style="color:var(--muted)">${u.hotkey}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
}

function buildLineChart(id, labels, datasets, metaEl, metaText) {
  const ctx = document.getElementById(id).getContext('2d');
  if (charts[id]) charts[id].destroy();
  if (metaEl) document.getElementById(metaEl).textContent = metaText || '';

  charts[id] = new Chart(ctx, {
    type: 'line',
    data: { labels, datasets },
    options: {
      ...CHART_DEFAULTS,
      scales: {
        ...CHART_DEFAULTS.scales,
        y: { ...CHART_DEFAULTS.scales.y }
      }
    }
  });
}

function buildCharts(history) {
  if (!history.accumulation_series?.length && !history.emission_series?.length) return;

  document.getElementById('chartsGrid').style.display = 'grid';

  const accData = history.accumulation_series || [];
  const priceData = history.price_series || [];
  const emData = history.emission_series || [];

  // Accumulation chart
  if (accData.length) {
    const total = accData[accData.length - 1]?.running || 0;
    buildLineChart(
      'chartAccumulation',
      accData.map(d => d.date),
      [{
        data: accData.map(d => d.running),
        borderColor: '#F59E0B',
        backgroundColor: 'rgba(245,158,11,0.05)',
        borderWidth: 2,
        fill: true,
        tension: 0.3,
        pointRadius: 3,
        pointBackgroundColor: '#F59E0B',
      }],
      'accMeta',
      'Running total: ' + parseFloat(total).toFixed(4) + ' ξ'
    );
  }

  // Alpha price chart
  const alphaFiltered = priceData.filter(d => d.alpha_price_tao);
  if (alphaFiltered.length) {
    const latest = alphaFiltered[alphaFiltered.length - 1]?.alpha_price_tao;
    buildLineChart(
      'chartAlpha',
      alphaFiltered.map(d => d.date),
      [{
        data: alphaFiltered.map(d => d.alpha_price_tao),
        borderColor: '#2563EB',
        backgroundColor: 'rgba(37,99,235,0.05)',
        borderWidth: 2,
        fill: true,
        tension: 0.3,
        pointRadius: 3,
        pointBackgroundColor: '#2563EB',
      }],
      'alphaMeta',
      'Latest: ' + parseFloat(latest).toFixed(6) + ' τ'
    );
  }

  // TAO price chart
  const taoFiltered = priceData.filter(d => d.tao_price_usd);
  if (taoFiltered.length) {
    const latest = taoFiltered[taoFiltered.length - 1]?.tao_price_usd;
    buildLineChart(
      'chartTao',
      taoFiltered.map(d => d.date),
      [{
        data: taoFiltered.map(d => d.tao_price_usd),
        borderColor: '#8B5CF6',
        backgroundColor: 'rgba(139,92,246,0.05)',
        borderWidth: 2,
        fill: true,
        tension: 0.3,
        pointRadius: 3,
        pointBackgroundColor: '#8B5CF6',
      }],
      'taoMeta',
      'Latest: $' + parseFloat(latest).toFixed(2)
    );
  }

  // Emission chart (dual: total + owner)
  if (emData.length) {
    const ctx = document.getElementById('chartEmission').getContext('2d');
    if (charts['chartEmission']) charts['chartEmission'].destroy();
    charts['chartEmission'] = new Chart(ctx, {
      type: 'bar',
      data: {
        labels: emData.map(d => d.date),
        datasets: [
          {
            label: 'Total',
            data: emData.map(d => d.total),
            backgroundColor: 'rgba(37,99,235,0.25)',
            borderColor: '#2563EB',
            borderWidth: 1,
            borderRadius: 2,
          },
          {
            label: 'Owner (18%)',
            data: emData.map(d => d.owner),
            backgroundColor: 'rgba(239,68,68,0.4)',
            borderColor: '#EF4444',
            borderWidth: 1,
            borderRadius: 2,
          },
        ]
      },
      options: {
        ...CHART_DEFAULTS,
        plugins: {
          ...CHART_DEFAULTS.plugins,
          legend: {
            display: true,
            labels: {
              color: '#64748b',
              font: { family: "'JetBrains Mono', monospace", size: 10 },
              boxWidth: 12,
              padding: 12,
            }
          }
        }
      }
    });
  }
}

async function triggerCollect() {
  const btn = document.querySelector('.btn-sm.primary');
  btn.textContent = 'Collecting…';
  btn.disabled = true;
  try {
    const r = await fetch('/api/collect', { method: 'POST' });
    const d = await r.json();
    if (d.status === 'ok') {
      btn.textContent = 'Done ✓';
      setTimeout(() => { btn.textContent = 'Collect Now'; btn.disabled = false; init(); }, 1500);
    } else {
      btn.textContent = 'Error';
      btn.disabled = false;
    }
  } catch {
    btn.textContent = 'Error';
    btn.disabled = false;
  }
}

async function init() {
  const summary = await loadSummary();
  if (!summary) return;
  const history = await loadHistory();
  buildCharts(history);
  await loadUids();
}

init();
</script>
</body>
</html>
